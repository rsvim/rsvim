allow-branch = ["main"]
pre-release-commit-message = "chore(release): {{version}}"
pre-release-hook = [
  "git-cliff",
  "--workdir",
  "../",
  "--tag",
  "{{version}}",
  "--output",
  "CHANGELOG.md",
]
release = true
shared-version = true
tag = true
tag-message = "chore(release): {{version}}"
tag-name = "v{{version}}"
